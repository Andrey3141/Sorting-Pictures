plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.face_organizer"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.face_organizer"
        minSdk = 26
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
        debug {
            multiDexEnabled = true
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation 'com.google.mlkit:face-detection:16.1.6'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.camera:camera-core:1.3.0'
}

configurations.all {
    resolutionStrategy {
        force 'androidx.work:work-multiprocess:2.8.1'
        force 'androidx.work:work-runtime:2.8.1'
        force 'androidx.work:work-runtime-ktx:2.8.1'
        force 'androidx.window:window:1.0.0'
        force 'androidx.window:window-java:1.1.0'
    }
}

android {
    packagingOptions {
        resources {
            excludes += ['META-INF/*']
        }
    }
}

tasks.withType(com.android.build.gradle.internal.tasks.CheckAarMetadataWorkAction) {
    enabled = false
}

configurations.all {
    exclude group: 'com.google.android.gms', module: 'play-services-basement'
    resolutionStrategy {
        force 'com.google.android.gms:play-services-basement:18.3.0'
    }
}
